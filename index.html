    <!-- Cookie Banner -->

        <button id="accept-cookies" class="w-full md:w-auto bg-white text-stone-900 font-bold py-2.5 px-8 rounded-lg text-sm hover:bg-stone-200 active:scale-95 transition-all shadow-md">

        </button>

    <!-- Scripts (Ab html clear hai) -->
    <script src="js/header-footer.js"></script>
    <script src="js/global-script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cookieBanner = document.getElementById('cookie-banner');
            const acceptCookiesBtn = document.getElementById('accept-cookies');

            if (cookieBanner && acceptCookiesBtn) {
                if (!localStorage.getItem('cookiesAccepted')) {
                    setTimeout(() => {
                         cookieBanner.classList.remove('translate-y-full');
                         cookieBanner.classList.add('translate-y-0');
                    }, 500);
                }

                acceptCookiesBtn.addEventListener('click', () => {
                    localStorage.setItem('cookiesAccepted', 'true');
                    cookieBanner.classList.remove('translate-y-0');
                    cookieBanner.classList.add('translate-y-full');
                    setTimeout(() => {
                        cookieBanner.style.display = 'none';
                    }, 300);
                });
            }
        });
    </script>
